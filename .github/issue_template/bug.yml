name: Bug report
description: Create a report about something that is not working
labels:
  - bug
  - triage
assignees:
  - beauchama
body:
  - type: checkboxes
    id: is-bug-exists
    attributes:
      label: Is there an existing bug for this?
      description: >-
        Please search to see if an issue already exists for the bug you encountered ([atlas/issues](https://github.com/wavepulse/atlas/issues)).
      options:
        - label: I have searched the existing issues
          required: true
  - type: textarea
    id: bug-description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
    validations:
      required: true
  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected behavior
      description: A clear and concise description of what you expected to happen.
  - type: textarea
    id: anything-else
    attributes:
      label: Anything else?
      description: |
        Links? References? Anything that will give us more context about the issue you are encountering!
        
        Tip: You can attach images or log files by clicking this area to highlight it and then dragging files in.
